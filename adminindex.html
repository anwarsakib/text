<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Love - Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#081120;
color:white;
overflow-x:hidden;
}

.loginPage{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#081120,#0f172a);
}

.loginCard{
width:360px;
background:#111c31;
padding:35px;
border-radius:25px;
box-shadow:0 0 40px rgba(0,0,0,.5);
}

.loginCard h1{
font-size:32px;
margin-bottom:25px;
text-align:center;
}

.input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
outline:none;
border-radius:14px;
background:#1d2b48;
color:white;
font-size:15px;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#ff4d8d,#ff2d55);
color:white;
font-weight:700;
cursor:pointer;
font-size:15px;
}

#adminPanel{
display:none;
}

.main{
padding:25px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
gap:15px;
}

.search{
flex:1;
padding:15px;
background:#111c31;
border:none;
border-radius:15px;
color:white;
outline:none;
font-size:15px;
}

.logout{
padding:15px 30px;
background:#ff2d55;
border:none;
border-radius:15px;
color:white;
font-weight:700;
cursor:pointer;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:#111c31;
padding:25px;
border-radius:25px;
}

.card h3{
font-size:15px;
color:#94a3b8;
margin-bottom:12px;
}

.big{
font-size:45px;
font-weight:700;
}

.grid{
display:grid;
grid-template-columns:1.4fr 1fr;
gap:20px;
}

.panel{
background:#111c31;
padding:20px;
border-radius:25px;
height:75vh;
overflow:auto;
}

.panel h2{
margin-bottom:20px;
font-size:28px;
}

.user{
background:#17233c;
padding:20px;
border-radius:18px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
}

.userLeft{
display:flex;
flex-direction:column;
gap:6px;
}

.userLeft b{
font-size:22px;
}

.userLeft span{
font-size:15px;
color:#e2e8f0;
}

.badge{
padding:7px 15px;
border-radius:30px;
font-size:13px;
font-weight:700;
width:max-content;
margin-top:5px;
}

.online{
background:#16a34a;
}

.offline{
background:#dc2626;
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.actBtn{
border:none;
padding:12px 15px;
border-radius:12px;
cursor:pointer;
font-size:14px;
font-weight:700;
color:white;
}

.view{
background:#2563eb;
}

.delete{
background:#dc2626;
}

.ban{
background:#ca8a04;
}

.message{
background:#17233c;
padding:18px;
border-radius:18px;
margin-bottom:15px;
}

.messageTop{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-size:14px;
gap:10px;
}

.msgText{
font-size:15px;
line-height:1.5;
color:#e2e8f0;
word-break:break-word;
}

::-webkit-scrollbar{
width:5px;
}

::-webkit-scrollbar-thumb{
background:#334155;
border-radius:30px;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

.topbar{
flex-direction:column;
}

.logout{
width:100%;
}

}

</style>
</head>

<body>

<!-- LOGIN -->

<div class="loginPage" id="loginPage">

<div class="loginCard">

<h1>💖 Admin Login</h1>

<input type="text" class="input" id="username" placeholder="Username">

<input type="password" class="input" id="password" placeholder="Password">

<button class="btn" onclick="login()">LOGIN</button>

</div>

</div>

<!-- ADMIN PANEL -->

<div id="adminPanel">

<div class="main">

<div class="topbar">

<input type="text" class="search" placeholder="Search user or message...">

<button class="logout" onclick="logout()">Logout</button>

</div>

<div class="cards">

<div class="card">
<h3>Total Users</h3>
<div class="big" id="totalUsers">0</div>
</div>

<div class="card">
<h3>Total Messages</h3>
<div class="big" id="totalMessages">0</div>
</div>

<div class="card">
<h3>Online Users</h3>
<div class="big" id="onlineUsers">0</div>
</div>

</div>

<div class="grid">

<!-- USERS -->

<div class="panel">

<h2>Registered Users</h2>

<div id="users"></div>

</div>

<!-- MESSAGES -->

<div class="panel">

<h2>Recent Messages</h2>

<div id="messages"></div>

</div>

</div>

</div>

</div>

<script>

const firebaseConfig = {
apiKey:"AIzaSyCwDkiTtF0CsGHQA7VLaiwc7pGqA6Kdniw",
authDomain:"my-love-c75a0.firebaseapp.com",
databaseURL:"https://my-love-c75a0-default-rtdb.firebaseio.com",
projectId:"my-love-c75a0",
storageBucket:"my-love-c75a0.firebasestorage.app",
messagingSenderId:"772550646144",
appId:"1:772550646144:web:a5183b79a13f0952e84965"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

function login(){

let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(u==="sakib" && p==="sakib72542"){

document.getElementById("loginPage").style.display="none";
document.getElementById("adminPanel").style.display="block";

loadUsers();
loadMessages();

}else{
alert("Wrong Login");
}

}

function logout(){
location.reload();
}

function loadUsers(){

db.ref("users").on("value",snap=>{

const data=snap.val() || {};

let html="";
let online=0;

document.getElementById("totalUsers").innerText=
Object.keys(data).length;

Object.keys(data).forEach(uid=>{

let u=data[uid];

if(u.online) online++;

html += `

<div class="user">

<div class="userLeft">

<b>${u.name || "Unknown"}</b>

<span>@${u.username || ""}</span>

<span>${u.email || ""}</span>

<span>${u.phone || ""}</span>

<span class="badge ${u.online ? 'online':'offline'}">
${u.online ? 'Online':'Offline'}
</span>

</div>

<div class="actions">

<button class="actBtn view"
onclick="viewUser('${uid}')">
View
</button>

<button class="actBtn ban"
onclick="banUser('${uid}')">
Ban
</button>

<button class="actBtn delete"
onclick="deleteUser('${uid}')">
Delete
</button>

</div>

</div>

`;

});

document.getElementById("users").innerHTML=html;
document.getElementById("onlineUsers").innerText=online;

});

}

function loadMessages(){

db.ref().on("value",snap=>{

const dbData=snap.val() || {};

let html="";
let total=0;

Object.keys(dbData).forEach(key=>{

if(
key.toLowerCase().includes("chat") ||
key.toLowerCase().includes("message")
){

const chats=dbData[key];

Object.keys(chats || {}).forEach(room=>{

const roomData=chats[room];

Object.keys(roomData || {}).forEach(msgId=>{

const m=roomData[msgId];

if(typeof m === "object"){

total++;

html += `

<div class="message">

<div class="messageTop">

<b>${m.senderName || m.name || "Unknown"}</b>

<span>
${new Date(m.time || Date.now()).toLocaleString()}
</span>

</div>

<div class="msgText">

${m.text || m.message || "[Media File]"}

</div>

</div>

`;

}

});

});

}

});

document.getElementById("messages").innerHTML=html;
document.getElementById("totalMessages").innerText=total;

});

}

function viewUser(uid){

db.ref("users/"+uid).once("value")
.then(snap=>{

const u=snap.val();

alert(

"Name: " + (u.name || "") + "\n\n" +

"Username: " + (u.username || "") + "\n\n" +

"Phone: " + (u.phone || "") + "\n\n" +

"Email: " + (u.email || "")

);

});

}

function banUser(uid){

db.ref("users/"+uid).update({
banned:true
});

alert("User Banned");

}

function deleteUser(uid){

if(confirm("Delete User ?")){

db.ref("users/"+uid).remove();

alert("User Deleted");

}

}

</script>

</body>
</html>
